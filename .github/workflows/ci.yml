name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Public boundary
        run: python scripts/check_public_boundary.py
      - name: Tests
        run: python -m pytest
      - name: Compile
        run: python -m compileall alphaops apps
      - name: Build
        run: python -m build
